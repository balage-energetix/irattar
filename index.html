<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO - Irattár & Üzenőfal</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            /* Official Dark Mode Palette */
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --primary: #fbbf24;
            /* Gold */
            --primary-hover: #f59e0b;
            --border: #334155;
            --danger: #ef4444;

            /* Institution Specific Colors */
            --color-ninesz: #10b981;
            --color-vg: #ef4444;
            --color-nf: #3b82f6;
            --color-pmh: #a855f7;
            --color-nksk: #f59e0b;
            --color-rszszk: #06b6d4;
            --color-rktot: #475569;

            --transition: all 0.2s ease;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
            --radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
        }

        .navbar {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary);
        }

        .brand {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-link {
            padding: 0.6rem 1.2rem;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: 8px;
            transition: var(--transition);
        }

        .nav-link:hover,
        .nav-link.active {
            color: var(--primary);
            background: rgba(251, 191, 36, 0.1);
        }

        .container {
            max-width: 1250px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .view-section {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .view-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .card-header {
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
        }

        .card-header h2 {
            font-size: 1.3rem;
            color: var(--primary);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
            text-transform: uppercase;
        }

        .input,
        .select,
        .textarea {
            width: 100%;
            padding: 0.8rem;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: #fff;
            transition: var(--transition);
        }

        .input:focus {
            border-color: var(--primary);
            outline: none;
        }

        .upload-zone {
            border: 2px dashed var(--border);
            padding: 2rem;
            text-align: center;
            border-radius: var(--radius);
            margin-bottom: 1.5rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .upload-zone:hover {
            border-color: var(--primary);
            background: rgba(251, 191, 36, 0.05);
        }

        .upload-zone.has-file {
            border-color: var(--color-ninesz);
            background: rgba(16, 185, 129, 0.05);
        }

        .inst-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 8px;
            margin-bottom: 1rem;
        }

        .inst-chip {
            padding: 8px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.8rem;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
        }

        .inst-chip:has(input:checked) {
            border-color: var(--primary);
            background: rgba(251, 191, 36, 0.2);
        }

        .inst-chip input {
            display: none;
        }

        .btn {
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: #000;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: #fff;
        }

        .btn-sm {
            padding: 0.4rem 0.6rem;
            font-size: 0.8rem;
        }

        .table-wrap {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #0f172a;
            padding: 1rem;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.03);
        }

        .tag {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 800;
            color: #fff;
            margin-right: 4px;
        }

        .tag-all {
            background: linear-gradient(45deg, #fbbf24, #10b981);
            color: #000;
        }

        .tag-ninesz {
            background: var(--color-ninesz);
        }

        .tag-vg {
            background: var(--color-vg);
        }

        .tag-nf {
            background: var(--color-nf);
        }

        .tag-pmh {
            background: var(--color-pmh);
        }

        .tag-nksk {
            background: var(--color-nksk);
        }

        .tag-rszszk {
            background: var(--color-rszszk);
        }

        .tag-rktot {
            background: var(--color-rktot);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.2);
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 2rem;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            width: 100%;
            max-width: 900px;
            max-height: 90vh;
            border-radius: var(--radius);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .modal-body {
            flex: 1;
            padding: 1rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-footer {
            padding: 1rem;
            border-top: 1px solid var(--border);
            text-align: right;
        }

        iframe {
            width: 100%;
            height: 600px;
            border: none;
            border-radius: 4px;
        }

        .msg-bubble {
            background: var(--bg-input);
            padding: 2rem;
            border-radius: 12px;
            border-left: 5px solid var(--primary);
            font-size: 1.1rem;
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="brand">
            <i class="fa-solid fa-folder-tree"></i>
            NEO <span style="font-weight: 300; margin-left:8px; color: var(--text-muted);">Irattár & Üzenőfal</span>
        </div>
        <div class="nav-links">
            <button class="nav-link active" onclick="switchView('main', this)">Üzenőfal & Beküldés</button>
            <button class="nav-link" onclick="switchView('archive', this)">Archívum</button>
        </div>
    </nav>

    <div class="container">

        <section id="view-main" class="view-section active">
            <div class="card">
                <div class="card-header">
                    <i class="fa-solid fa-pen-nib"></i>
                    <h2>Új bejegyzés / Dokumentum feltöltés</h2>
                </div>

                <div class="upload-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
                    <i class="fa-solid fa-paperclip"></i>
                    <p id="file-status">Fájl csatolása (opcionális)</p>
                    <input type="file" id="file-input" style="display: none;" onchange="updateFileStatus(this)">
                </div>

                <div class="form-grid">
                    <div>
                        <label class="label">Cím / Tárgy</label>
                        <input type="text" class="input" id="item-title" placeholder="A bejegyzés címe">
                    </div>
                    <div>
                        <label class="label">Típus</label>
                        <select class="select" id="item-type">
                            <option value="Üzenet">Üzenet</option>
                            <option value="Számla">Számla</option>
                            <option value="Szerződés">Szerződés</option>
                            <option value="Tájékoztatás">Tájékoztatás</option>
                        </select>
                    </div>
                    <div>
                        <label class="label">Kategória</label>
                        <select class="select" id="item-cat">
                            <option value="Általános">Általános</option>
                            <option value="Pénzügyi">Pénzügyi</option>
                            <option value="Műszaki">Műszaki</option>
                        </select>
                    </div>
                </div>

                <label class="label">Érintett Intézmények</label>
                <div class="inst-grid">
                    <label class="inst-chip"><input type="checkbox" value="ALL" onchange="toggleAll(this)">
                        MINDENKI</label>
                    <label class="inst-chip"><input type="checkbox" name="inst" value="NINESZ"> NINESZ</label>
                    <label class="inst-chip"><input type="checkbox" name="inst" value="VG"> VG</label>
                    <label class="inst-chip"><input type="checkbox" name="inst" value="NF"> NF</label>
                    <label class="inst-chip"><input type="checkbox" name="inst" value="PMH"> PMH</label>
                    <label class="inst-chip"><input type="checkbox" name="inst" value="NKSK"> NKSK</label>
                    <label class="inst-chip"><input type="checkbox" name="inst" value="RSZSZK"> RSZSZK</label>
                    <label class="inst-chip"><input type="checkbox" name="inst" value="RKTÖT"> RKTÖT</label>
                </div>

                <label class="label">Bejegyzés tartalma / Megjegyzés</label>
                <textarea class="textarea" id="item-body" placeholder="Írja ide az üzenetet..."></textarea>

                <div style="text-align: right; margin-top:1.5rem;">
                    <button id="submit-btn" class="btn btn-primary" onclick="submitItem()">Beküldés</button>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2>Friss bejegyzések</h2>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Cím</th>
                                <th>Típus</th>
                                <th>Intézmények</th>
                                <th>Dátum</th>
                                <th>Műveletek</th>
                            </tr>
                        </thead>
                        <tbody id="recent-list"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="view-archive" class="view-section">
            <div class="card">
                <input type="text" class="input" id="search-box" placeholder="Keresés az archívumban..."
                    oninput="renderArchive()">
                <div class="table-wrap" style="margin-top:2rem;">
                    <table>
                        <thead>
                            <tr>
                                <th>Cím</th>
                                <th>Típus</th>
                                <th>Intézmények</th>
                                <th>Dátum</th>
                                <th>Műveletek</th>
                            </tr>
                        </thead>
                        <tbody id="archive-list"></tbody>
                    </table>
                </div>
            </div>
        </section>

    </div>

    <!-- MODAL -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Megtekintés</h3>
                <button class="btn btn-outline btn-sm" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeModal()">Bezárás</button>
            </div>
        </div>
    </div>

    <script>
        // SUPABASE CONFIGURATION
        const supabaseUrl = 'https://vzzhljxwpumygjxgiixo.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ6emhsanh3cHVteWdqeGdpaXhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDA1MzcsImV4cCI6MjA4Nzg3NjUzN30.hotJhijSf4dU2mfNoG1rFoREbZ_znRLgGUJS4cyRbSA';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let localDb = [];

        document.addEventListener('DOMContentLoaded', async () => {
            await fetchItems();
        });

        async function fetchItems() {
            const { data, error } = await _supabase
                .from('documents')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error('Error fetching data:', error);
            } else {
                localDb = data;
                renderRecent();
            }
        }

        function switchView(view, btn) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById('view-' + view).classList.add('active');
            btn.classList.add('active');
            if (view === 'archive') renderArchive();
        }

        function toggleAll(master) {
            document.querySelectorAll('input[name="inst"]').forEach(cb => cb.checked = master.checked);
        }

        function updateFileStatus(input) {
            const zone = document.getElementById('drop-zone');
            if (input.files.length > 0) {
                document.getElementById('file-status').innerText = "Csatolva: " + input.files[0].name;
                zone.classList.add('has-file');
                if (!document.getElementById('item-title').value) {
                    document.getElementById('item-title').value = input.files[0].name.split('.')[0];
                }
            } else {
                document.getElementById('file-status').innerText = "Fájl csatolása (opcionális)";
                zone.classList.remove('has-file');
            }
        }

        async function submitItem() {
            const title = document.getElementById('item-title').value;
            const type = document.getElementById('item-type').value;
            const cat = document.getElementById('item-cat').value;
            const body = document.getElementById('item-body').value;
            const fileInput = document.getElementById('file-input');
            const submitBtn = document.getElementById('submit-btn');
            const inst = [];

            const allChecked = document.querySelector('input[value="ALL"]').checked;
            if (allChecked) inst.push("ALL");
            else document.querySelectorAll('input[name="inst"]:checked').forEach(c => inst.push(c.value));

            if (!title) return alert("Kérjük adjon meg egy címet!");

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Küldés...';

            let filePath = null;
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                const fileExt = file.name.split('.').pop();
                const fileName = `${Math.random()}.${fileExt}`;
                filePath = `uploads/${fileName}`;

                const { error: uploadError } = await _supabase.storage
                    .from('neo-vault')
                    .upload(filePath, file);

                if (uploadError) {
                    alert('Fájl feltöltési hiba: ' + uploadError.message);
                    submitBtn.disabled = false;
                    submitBtn.innerText = 'Beküldés';
                    return;
                }
            }

            const { error: dbError } = await _supabase
                .from('documents')
                .insert([{
                    name: title,
                    file_type: type,
                    category: cat,
                    institutions: inst,
                    comment: body,
                    file_path: filePath
                }]);

            if (dbError) {
                alert('Adatbázis hiba: ' + dbError.message);
            } else {
                alert("Sikeres beküldés!");
                await fetchItems();
                // Clear form
                document.getElementById('item-title').value = '';
                document.getElementById('item-body').value = '';
                fileInput.value = '';
                updateFileStatus(fileInput);
            }

            submitBtn.disabled = false;
            submitBtn.innerText = 'Beküldés';
        }

        function renderRecent() {
            renderTable('recent-list', localDb.slice(0, 5));
        }

        function renderArchive() {
            const q = document.getElementById('search-box').value.toLowerCase();
            const filtered = localDb.filter(i =>
                i.name.toLowerCase().includes(q) ||
                (i.comment && i.comment.toLowerCase().includes(q))
            );
            renderTable('archive-list', filtered);
        }

        function renderTable(id, data) {
            const tbody = document.getElementById(id);
            tbody.innerHTML = '';
            data.forEach(item => {
                const tr = document.createElement('tr');
                const date = new Date(item.created_at).toLocaleDateString('hu-HU');
                tr.innerHTML = `
                    <td style="font-weight:700">${item.name}</td>
                    <td>${item.file_type}</td>
                    <td>${item.institutions.map(i => `<span class="tag tag-${i.toLowerCase()}">${i === 'ALL' ? 'MINDENKI' : i}</span>`).join('')}</td>
                    <td>${date}</td>
                    <td>
                        <button class="btn btn-outline btn-sm" onclick="openPreview('${item.id}')"><i class="fa-solid fa-eye"></i></button>
                        <button class="btn btn-outline btn-sm" onclick="renameItem('${item.id}')"><i class="fa-solid fa-edit"></i></button>
                        <button class="btn btn-sm" style="color:var(--danger)" onclick="deleteItem('${item.id}')"><i class="fa-solid fa-trash"></i></button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function openPreview(id) {
            const item = localDb.find(i => i.id == id);
            const body = document.getElementById('modal-body');
            document.getElementById('modal-title').innerText = item.name;

            if (item.file_path) {
                const { data } = _supabase.storage
                    .from('neo-vault')
                    .getPublicUrl(item.file_path);

                if (item.file_path.toLowerCase().endsWith('.pdf')) {
                    body.innerHTML = `<iframe src="${data.publicUrl}"></iframe><p style="margin-top:10px">${item.comment || ''}</p>`;
                } else {
                    body.innerHTML = `<div class="msg-bubble"><p>${item.comment || ''}</p><hr style="margin:1rem 0; border:0; border-top:1px solid var(--border);"><p>Melléklet letöltése: <a href="${data.publicUrl}" target="_blank" style="color:var(--primary)">Kattintson ide</a></p></div>`;
                }
            } else {
                body.innerHTML = `<div class="msg-bubble">${item.comment || '<i>Nincs szöveges tartalom</i>'}</div>`;
            }

            document.getElementById('modal').classList.add('active');
        }

        function closeModal() { document.getElementById('modal').classList.remove('active'); }

        async function renameItem(id) {
            const newName = prompt("Adjon meg egy új nevet:");
            if (newName) {
                const { error } = await _supabase
                    .from('documents')
                    .update({ name: newName })
                    .eq('id', id);

                if (error) alert('Hiba az átnevezéskor: ' + error.message);
                else await fetchItems();
            }
        }

        async function deleteItem(id) {
            if (confirm('Biztosan törli ezt a bejegyzést?')) {
                const item = localDb.find(i => i.id == id);
                if (item.file_path) {
                    await _supabase.storage.from('neo-vault').remove([item.file_path]);
                }
                const { error } = await _supabase.from('documents').delete().eq('id', id);
                if (error) alert('Hiba a törléskor: ' + error.message);
                else await fetchItems();
            }
        }
    </script>
</body>

</html>
